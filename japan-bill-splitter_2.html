<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>割り勘 · 日本拆帳工具</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a18; --paper: #f7f5f0; --paper-2: #eeece6;
    --red: #c0392b; --green: #1a6b4a; --border: rgba(26,26,24,0.12);
    --border-strong: rgba(26,26,24,0.25); --radius-lg: 8px;
    --mono: 'DM Mono', monospace; --serif: 'Noto Serif JP', serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--serif); background: var(--paper); color: var(--ink); line-height: 1.7; padding-bottom: 80px; }
  .shell { max-width: 720px; margin: 0 auto; padding: 0 20px; }
  header { padding: 40px 0 32px; border-bottom: 1px solid var(--border); margin-bottom: 36px; display: flex; align-items: baseline; gap: 16px; }
  .logo-jp { font-size: 22px; font-weight: 300; letter-spacing: 0.12em; }
  .logo-sub { font-family: var(--mono); font-size: 11px; color: #8a8a84; text-transform: uppercase; }

  .steps-nav { display: flex; margin-bottom: 36px; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
  .step-tab { flex: 1; padding: 10px 8px; text-align: center; font-family: var(--mono); font-size: 11px; cursor: pointer; border-right: 1px solid var(--border); background: var(--paper-2); }
  .step-tab.active { background: var(--ink); color: var(--paper); }
  .step-tab .num { display: block; font-size: 16px; }

  .panel { display: none; }
  .panel.active { display: block; }

  .upload-zone { border: 1.5px dashed var(--border-strong); border-radius: var(--radius-lg); padding: 50px 20px; text-align: center; cursor: pointer; background: var(--paper-2); position: relative; }
  .upload-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .progress-wrap { display: none; margin-top: 20px; }
  .progress-bar { height: 3px; background: #e4e1d8; margin-top: 8px; border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--ink); width: 0%; transition: width 0.3s; }

  .item-card { border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px; margin-bottom: 12px; background: #fff; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px; font-family: var(--mono); font-size: 12px; border: 1px solid var(--border-strong); border-radius: 4px; background: var(--paper); cursor: pointer; }
  .btn-fill { background: var(--ink); color: var(--paper); }
  .payer-chip { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 11px; margin: 5px 5px 0 0; cursor: pointer; border: 1px solid var(--border); background: var(--paper-2); }
  .payer-chip.on { background: var(--ink); color: #fff; }
  input { border: none; border-bottom: 1px solid var(--border); padding: 4px; background: transparent; }
</style>
</head>
<body>

<div class="shell">
  <header>
    <span class="logo-jp">割り勘</span>
    <span class="logo-sub">Japan Bill Splitter</span>
  </header>

  <div class="steps-nav">
    <div class="step-tab active" data-step="0" onclick="goStep(0)"><span class="num">01</span>辨識</div>
    <div class="step-tab" data-step="1" onclick="goStep(1)"><span class="num">02</span>成員</div>
    <div class="step-tab" data-step="2" onclick="goStep(2)"><span class="num">03</span>分配</div>
    <div class="step-tab" data-step="3" onclick="goStep(3)"><span class="num">04</span>結算</div>
  </div>

  <!-- Step 0 -->
  <div class="panel active" id="panel-0">
    <div class="upload-zone">
      <input type="file" accept="image/*" id="fileInput">
      <span>🧾 點擊上傳發票圖片</span>
    </div>
    <div class="progress-wrap" id="progress-wrap">
      <div style="display:flex; justify-content:space-between; font-family:var(--mono); font-size:11px;">
        <span id="progress-text">辨識中...</span>
        <span id="progress-pct">0%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    </div>
    <div style="margin-top:24px; display:flex; gap:10px;">
      <button class="btn btn-fill" id="btn-ocr" style="display:none;" onclick="runOCR()">🔍 自動辨識明細</button>
      <button class="btn" onclick="goStep(1)">手動輸入項目 →</button>
    </div>
  </div>

  <!-- Step 1 -->
  <div class="panel" id="panel-1">
    <h3>參與成員</h3>
    <div id="payer-list" style="margin: 20px 0;"></div>
    <button class="btn" onclick="addPayer()">＋ 新增成員</button>
    <div style="margin-top:30px;"><button class="btn btn-fill" onclick="goStep(2)">下一步：分配品項 →</button></div>
  </div>

  <!-- Step 2 -->
  <div class="panel" id="panel-2">
    <h3>品項分配 (¥)</h3>
    <div id="item-list" style="margin: 20px 0;"></div>
    <button class="btn" onclick="addItem()">＋ 新增品項</button>
    <div style="margin-top:30px; display:flex; justify-content:space-between;">
      <button class="btn" onclick="goStep(1)">← 返回</button>
      <button class="btn btn-fill" onclick="goStep(3)">查看結算結果 →</button>
    </div>
  </div>

  <!-- Step 3 -->
  <div class="panel" id="panel-3">
    <h3>結算金額</h3>
    <div id="summary-content" style="margin: 20px 0;"></div>
    <button class="btn btn-fill" onclick="exportCSV()">匯出檔案</button>
  </div>
</div>

<canvas id="tempCanvas" style="display:none;"></canvas>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<script>
  // 1. 初始化狀態
  let state = {
    payers: [{id: 1, name: 'Wei-Yen'}, {id: 2, name: '朋友'}],
    items: [],
    nextId: 100
  };

  // 2. 核心切換邏輯：放在最前面避免 ReferenceError
  function goStep(n) {
    document.querySelectorAll('.panel').forEach((p, i) => p.classList.toggle('active', i === n));
    document.querySelectorAll('.step-tab').forEach((t, i) => t.classList.toggle('active', i === n));
    if (n === 1) renderPayers();
    if (n === 2) renderItems();
    if (n === 3) renderSummary();
  }

  // 3. OCR 邏輯[cite: 1]
  async function runOCR() {
    const file = document.getElementById('fileInput').files[0];
    if (!file) return;

    if (window.location.protocol === 'file:') {
        alert("偵測到您直接開啟檔案。若辨識無反應，請參考前述方法使用 Live Server 或 Python 伺服器開啟。");
    }

    document.getElementById('progress-wrap').style.display = 'block';
    const btn = document.getElementById('btn-ocr');
    btn.disabled = true;

    try {
      const worker = await Tesseract.createWorker('jpn+eng', 1, {
        logger: m => {
          if (m.status === 'recognizing text') {
            const p = Math.round(m.progress * 100);
            document.getElementById('progress-fill').style.width = p + '%';
            document.getElementById('progress-pct').textContent = p + '%';
          }
        }
      });

      const { data: { text } } = await worker.recognize(file);
      await worker.terminate();
      
      state.items = parseReceipt(text);
      goStep(1);
    } catch (e) {
      console.error(e);
      alert("辨識失敗，請嘗試手動輸入。錯誤：" + e.message);
      goStep(1);
    }
  }

  function parseReceipt(text) {
    const lines = text.split('\n').map(l => l.trim());
    const priceRe = /([0-9０-９,，.]{2,})\s*[円点税]?$/; // 抓取行末金額[cite: 1]
    const results = [];

    lines.forEach(line => {
      const m = line.match(priceRe);
      if (m) {
        let rawPrice = m[1].replace(/[,，. ]/g, '').replace(/[０-９]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFF10 + 48));
        const price = parseInt(rawPrice, 10);
        if (!isNaN(price) && price < 1000000) {
            let name = line.replace(m[0], '').trim().substring(0, 15);
            results.push({ id: state.nextId++, name: name || "品項", price: price, assignees: [] });
        }
      }
    });
    return results;
  }

  // 4. UI 渲染功能[cite: 1]
  function renderPayers() {
    const container = document.getElementById('payer-list');
    container.innerHTML = state.payers.map(p => `
      <div style="margin-bottom:8px; display:flex; gap:10px;">
        <input style="flex:1" value="${p.name}" onchange="updatePayer(${p.id}, this.value)">
        <button onclick="removePayer(${p.id})" style="color:var(--red); border:none; background:none; cursor:pointer;">✕</button>
      </div>
    `).join('');
  }

  function renderItems() {
    const container = document.getElementById('item-list');
    container.innerHTML = state.items.map(it => `
      <div class="item-card">
        <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
          <input style="width:60%" value="${it.name}" onchange="updateItem(${it.id}, 'name', this.value)">
          <input style="width:30%; text-align:right;" type="number" value="${it.price}" onchange="updateItem(${it.id}, 'price', this.value)">
        </div>
        <div>
          ${state.payers.map(p => `
            <span class="payer-chip ${it.assignees.includes(p.id) ? 'on' : ''}" onclick="toggleAssign(${it.id}, ${p.id})">${p.name}</span>
          `).join('')}
        </div>
      </div>
    `).join('');
  }

  function renderSummary() {
    const totals = {};
    state.payers.forEach(p => totals[p.id] = 0);
    state.items.forEach(it => {
      const targets = it.assignees.length ? it.assignees : state.payers.map(p => p.id);
      const per = it.price / targets.length;
      targets.forEach(tid => totals[tid] += per);
    });
    document.getElementById('summary-content').innerHTML = state.payers.map(p => `
      <div style="display:flex; justify-content:space-between; padding:12px; border-bottom:1px solid var(--border);">
        <strong>${p.name}</strong>
        <span style="font-family:var(--mono); color:var(--green)">¥ ${Math.round(totals[p.id]).toLocaleString()}</span>
      </div>
    `).join('');
  }

  // 數據操作
  function addPayer() { state.payers.push({id: Date.now(), name: '新成員'}); renderPayers(); }
  function removePayer(id) { state.payers = state.payers.filter(p => p.id !== id); renderPayers(); }
  function updatePayer(id, val) { state.payers.find(p => p.id === id).name = val; }
  function addItem() { state.items.push({id: state.nextId++, name: '新項目', price: 0, assignees: []}); renderItems(); }
  function updateItem(id, k, v) { const it = state.items.find(x => x.id === id); it[k] = k==='price'?parseInt(v):v; }
  function toggleAssign(iid, pid) {
    const it = state.items.find(x => x.id === iid);
    const idx = it.assignees.indexOf(pid);
    if(idx > -1) it.assignees.splice(idx,1); else it.assignees.push(pid);
    renderItems();
  }
  function exportCSV() {
    let content = "Item,Price,Who\n" + state.items.map(it => `${it.name},${it.price},${it.assignees.length?it.assignees.join('/'):'All'}`).join('\n');
    const blob = new Blob([content], {type: 'text/csv'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'split.csv'; a.click();
  }

  // 監聽上傳
  document.getElementById('fileInput').addEventListener('change', function(e) {
    if(e.target.files[0]) document.getElementById('btn-ocr').style.display = 'inline-flex';
  });
</script>
</body>
</html>
